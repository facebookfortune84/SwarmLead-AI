services:

  postgres:
    image: postgres:16-alpine
    container_name: swarmlead-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: swarm
      POSTGRES_USER: swarm
      POSTGRES_PASSWORD: SwarmLead2026!

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swarm -d swarm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: swarmlead-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .

    container_name: swarmlead-api

    restart: unless-stopped

    env_file:
      - .env.docker

    ports:
      - "8000:8000"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data: